name: FastAPI Calculator CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fastapi_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fastapi_db

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11


    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx playwright

    - name: Install Playwright Browsers
      run: python -m playwright install --with-deps


    - name: Start FastAPI server in background
      run: |
        nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &

    - name: Wait for server
      run: |
        for i in {1..30}; do
          nc -z localhost 8000 && echo "Server is up!" && exit 0
          sleep 1
        done
        echo "Server did not start in time" && tail -40 server.log && exit 1

    - name: Run unit & integration tests
      run: pytest --timeout=60 --ignore=tests/e2e/

    - name: Run Playwright end-to-end tests
      env:
        CI: 1
      run: pytest -v --tb=short --timeout=60 tests/e2e/

    - name: Print server log after E2E tests
      if: always()
      run: tail -40 server.log || true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: lgronnevik/fastapi-calculator:latest